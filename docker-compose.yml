services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: regrag-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-regrag}
      POSTGRES_USER: ${POSTGRES_USER:-regrag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-regrag_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-regrag} -d ${POSTGRES_DB:-regrag}"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: regrag-api
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      DATABASE_URL: postgresql://${POSTGRES_USER:-regrag}:${POSTGRES_PASSWORD:-regrag_dev_password}@postgres:5432/${POSTGRES_DB:-regrag}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - hf_cache:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* values are baked at build time. From the browser's
      # perspective the API is reachable at localhost:8000 (the api service
      # publishes that port on the host). Override here to point production
      # builds at a different domain.
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: regrag-web
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://127.0.0.1:3000/', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  pgdata:
  hf_cache:
